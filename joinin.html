<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting Worlds – Join in!</title>

<style>
  :root {
    --bg: #f5f5f5;
    --panel-bg: #ffffff;
    --border: #cccccc;
    --accent: #003366;
    --accent-soft: #e8eef7;
    --button-bg: #0055aa;
    --button-bg-alt: #666666;
    --button-text: #ffffff;
    --danger: #b00020;
    --success: #008744;
    --quick-bg: #eeeeee;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: #222;
    line-height: 1.5;
  }

  /* Top navigation bar */
  #top-nav {
    background: #003366;
    color: white;
    padding: 0.6rem 1rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    border-bottom: 3px solid #002244;
    font-size: 1rem;
  }

  #top-nav a {
    color: white;
    text-decoration: none;
    font-weight: 600;
  }

  #top-nav a:hover,
  #top-nav a:focus {
    text-decoration: underline;
    outline: none;
  }

  #top-nav a[aria-current="page"] {
    text-decoration: underline;
  }

  #app {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr) 260px;
    gap: 0.75rem;
    padding: 0.75rem;
    height: calc(100vh - 60px);
  }

  #left-panel,
  #middle-panel,
  #right-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Buttons */
  .aac-button,
  button {
    font-size: 0.95rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    margin-bottom: 0.4rem;
  }

  .aac-button {
    background: var(--button-bg);
    color: var(--button-text);
  }

  .aac-button.disconnected {
    background: var(--button-bg-alt);
  }

  #disconnect-btn {
    background: var(--danger);
  }

#status-panel {
  display: none;
}

  #sound-toggle,
  #presence-toggle {
    background: #dddddd;
    color: #000;
  }

  /* Quick phrases */
  #quick-phrases {
    margin-top: 0.5rem;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.4rem;
  }

  .quick-phrase {
    background: var(--quick-bg);
    border-radius: 4px;
    padding: 0.4rem;
    text-align: center;
    font-size: 0.9rem;
    cursor: pointer;
  }

  /* Middle panel */
  #chat {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem;
    overflow-y: auto;
    font-size: 0.95rem;
    background: #fafafa;
  }

  #input-area {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.4rem;
  }

  #chat-input {
    flex: 1;
    padding: 0.5rem;
    font-size: 0.95rem;
    border-radius: 4px;
    border: 1px solid #aaaaaa;
  }

  #send-btn {
    background: var(--accent);
    color: #ffffff;
  }

  #conversation-memory {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    max-height: 120px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    padding-top: 0.4rem;
  }

  /* Right panel */
  #current-channel {
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  #channel-list,
  #user-list {
    list-style: none;
    padding-left: 0;
    margin: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    max-height: 40vh;
    overflow-y: auto;
    font-size: 0.9rem;
  }

  #channel-list li,
  #user-list li {
    padding: 0.3rem 0.4rem;
    cursor: pointer;
  }

  #channel-list li:hover,
  #channel-list li:focus {
    background: var(--accent-soft);
  }

  /* Visual cue flashes */
  .user-flash-join {
    background: #d8f5d0;
    transition: background 1s ease;
  }

  .user-flash-leave {
    background: #f8d0d0;
    transition: background 1s ease;
  }

  @media (max-width: 900px) {
    #app {
      grid-template-columns: 1fr;
      height: auto;
    }
  }
</style>
</head>
<body>

<!-- TOP NAVIGATION -->
<nav id="top-nav" aria-label="Site navigation">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="joinin.html" aria-current="page">Join In</a>
</nav>

<div id="app">

  <!-- LEFT PANEL -->
  <div id="left-panel" aria-label="AAC controls and connection" role="region">

<button id="connect-btn"
        class="aac-button disconnected"
        onclick="bridge.connectEverything()"
        aria-label="Connect to start communicating">
  Connect
</button>

<button id="disconnect-btn"
        class="aac-button"
        onclick="bridge.disconnectEverything()"
        style="display:none;"
        aria-label="Disconnect from the conversation">
  Disconnect
</button>

    <div id="status-panel" role="status" aria-live="polite">
      <div id="bridge-status">Bridge: 🔴 Disconnected</div>
      <div id="tt-status">TeamTalk: 🔴 Disconnected</div>
    </div>

    <button id="sound-toggle"
            onclick="toggleSoundCues()"
            aria-pressed="true">
      Sound cues: ON
    </button>

    <button id="presence-toggle"
            onclick="togglePresenceCues()"
            aria-pressed="true">
      Presence tones: ON
    </button>

<button id="vibration-toggle"
        onclick="toggleVibrationCues()"
        aria-pressed="true">
  Vibration cues: ON
</button>

<div id="ready-status"
     role="status"
     aria-live="polite">
  Ready to send: NO
</div>

    <button class="aac-button"
            onclick="speakText(document.getElementById('chat-input').value)">
      Speak Text
    </button>

    <button class="aac-button"
            onclick="speechSynthesis.cancel()">
      Stop Speech
    </button>

    <button class="aac-button"
            onclick="startSpeechToText()">
      Speech → Text
    </button>

    <!-- QUICK PHRASES -->
    <div id="quick-phrases" aria-label="Quick phrases" role="list">
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('Yes')">
        Yes
      </div>
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('No')">
        No
      </div>
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('Wait a moment')">
        Wait a moment
      </div>
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('I need help')">
        I need help
      </div>
    </div>

  </div>

  <!-- MIDDLE PANEL -->
  <div id="middle-panel" aria-label="Chat and message composition" role="region">
    <div id="chat"
         role="log"
         aria-live="polite"
         aria-relevant="additions text">
      <p>[Connecting Worlds AAC + TeamTalk Shell]</p>
      <p>Tap “Connect” to connect to the bridge and TeamTalk.</p>
    </div>

    <div id="input-area">
      <input id="chat-input"
             type="text"
             placeholder="Type your message…"
             aria-label="Chat message"
             onkeydown="if(event.key==='Enter'){ sendTeamTalkChat(); }">
      <button id="send-btn"
              onclick="sendTeamTalkChat()">
        Send
      </button>
    </div>

    <div id="conversation-memory"
         aria-label="Conversation memory"
         role="region">
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel" aria-label="Channels and users" role="region">

    <div id="current-channel">
      Current channel: <span id="current-channel-label">/</span>
    </div>

    <section aria-labelledby="channels-heading">
      <h2 id="channels-heading">Channels</h2>
      <ul id="channel-list">
        <li>[No channels yet]</li>
      </ul>
    </section>

    <section aria-labelledby="users-heading">
      <h2 id="users-heading">Users</h2>
      <ul id="user-list">
        <li>[No users yet]</li>
      </ul>
    </section>

  </div>
</div>

<!-- SOUND CUES -->
<audio id="sound-bridge-connected"></audio>
<audio id="sound-bridge-disconnected"></audio>
<audio id="sound-tt-connected"></audio>
<audio id="sound-tt-disconnected"></audio>
<audio id="sound-presence-join"></audio>
<audio id="sound-presence-leave"></audio>
<audio id="sound-channel-change"></audio>

<!-- SPEECH HELPER -->
<script>
function speakText(text) {
  if (!text) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1;
  utter.pitch = 1;
  speechSynthesis.speak(utter);
}
</script>

<script>
function updateReadyStatus(isReady) {
  const el = document.getElementById("ready-status");
  if (!el) return;
  el.textContent = "Ready to send: " + (isReady ? "YES" : "NO");
}
</script>

<!-- NEW BRIDGE -->
<script>
  window._ttHost = "tt.seedy.cc";
  window._ttPort = 10333; 
  window._ttUsername = "admin";
  window._ttPassword = "admin";
</script>
<script src="bridge.js"></script>

<script src="bridge.js"></script>

<script>
/* ---------------------------------------------------------
   DOM READY WRAPPER
   Ensures all UI elements exist before attaching listeners
   --------------------------------------------------------- */
window.addEventListener("DOMContentLoaded", () => {

 /* ---------------------------------------------------------
   1. CONNECTION BUTTON
   --------------------------------------------------------- */
function updateConnectionButton(isConnected) {
  const connectBtn = document.getElementById("connect-btn");
  const disconnectBtn = document.getElementById("disconnect-btn");

  if (isConnected) {
    connectBtn.style.display = "none";
    disconnectBtn.style.display = "block";
  } else {
    connectBtn.style.display = "block";
    disconnectBtn.style.display = "none";
  }
}

bridge.on("connected", () => {
  requestAnimationFrame(() => updateConnectionButton(true));
});

bridge.on("disconnected", () => {
  requestAnimationFrame(() => updateConnectionButton(false));
});


  /* ---------------------------------------------------------
     2. PRESENCE LOG
     --------------------------------------------------------- */
  function logPresence(text) {
    const chat = document.getElementById("chat");
    const p = document.createElement("p");
    p.style.color = "#666";
    p.style.fontSize = "0.85rem";
    p.textContent = text;
    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
  }


  /* ---------------------------------------------------------
     3. CENTRAL REFRESH FUNCTION
     --------------------------------------------------------- */
  async function refreshUI() {
    try {
      const channels = await bridge.getChannels();
      const users = await bridge.getUsers();
      const current = await bridge.getCurrentChannel();

      updateChannelList(channels);
      updateUserList(users);
      updateCurrentChannel(current);

    } catch (err) {
      console.error("Refresh failed:", err);
    }
  }


  /* ---------------------------------------------------------
     4. DOM UPDATE HELPERS
     --------------------------------------------------------- */
  function updateChannelList(channels) {
    const ul = document.getElementById("channel-list");
    ul.innerHTML = "";

    if (!channels || channels.length === 0) {
      ul.innerHTML = "<li>[No channels yet]</li>";
      return;
    }

    channels.forEach(ch => {
      const li = document.createElement("li");
      li.textContent = ch.name;
      li.tabIndex = 0;
      li.onclick = () => bridge.joinChannel(ch.id);
      li.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          bridge.joinChannel(ch.id);
        }
      };
      ul.appendChild(li);
    });

    if (window._flashChannelChange) {
      ul.style.background = "#e8eef7";
      setTimeout(() => { ul.style.background = ""; }, 600);
      window._flashChannelChange = false;
    }
  }

  function updateUserList(users) {
    const ul = document.getElementById("user-list");
    ul.innerHTML = "";

    if (!users || users.length === 0) {
      ul.innerHTML = "<li>[No users yet]</li>";
      return;
    }

    users.forEach(u => {
      const li = document.createElement("li");
      li.textContent = u.nickname;
      li.dataset.id = u.id;
      ul.appendChild(li);
    });

    if (window._flashUserJoin) {
      const li = document.querySelector(`#user-list li[data-id="${window._flashUserJoin}"]`);
      if (li) {
        li.classList.add("user-flash-join");
        setTimeout(() => li.classList.remove("user-flash-join"), 1000);
      }
      window._flashUserJoin = null;
    }

    if (window._flashUserLeave) {
      const li = document.querySelector(`#user-list li[data-id="${window._flashUserLeave}"]`);
      if (li) {
        li.classList.add("user-flash-leave");
        setTimeout(() => li.classList.remove("user-flash-leave"), 1000);
      }
      window._flashUserLeave = null;
    }
  }

  function updateCurrentChannel(ch) {
    const label = document.getElementById("current-channel-label");
    label.textContent = ch ? ch.name : "/";
  }


  /* ---------------------------------------------------------
     5. POLLING LOOP
     --------------------------------------------------------- */
  let refreshInterval = null;

  function startPolling() {
    refreshUI();
    refreshInterval = setInterval(refreshUI, 4000);
  }

  function stopPolling() {
    if (refreshInterval) clearInterval(refreshInterval);
  }


  /* ---------------------------------------------------------
     6. VISIBILITY + BFCache FIXES
     --------------------------------------------------------- */
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      refreshUI();
    }
  });

  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      refreshUI();
    }
  });


  /* ---------------------------------------------------------
     7. BRIDGE EVENT HOOKS
     --------------------------------------------------------- */
  bridge.on("connected", refreshUI);
  bridge.on("channel-added", refreshUI);
  bridge.on("channel-removed", refreshUI);
  bridge.on("user-connected", refreshUI);
  bridge.on("user-disconnected", refreshUI);

  bridge.on("channel-change", () => {
    window._flashChannelChange = true;
    requestAnimationFrame(refreshUI);
  });

  bridge.on("channel-changed", () => {
    window._flashChannelChange = true;
    requestAnimationFrame(refreshUI);
  });

  bridge.on("tt-connected", () => {
    console.log("UI: TeamTalk connected event received");
    refreshUI();
  });


  /* ---------------------------------------------------------
     8. START EVERYTHING
     --------------------------------------------------------- */
  window.addEventListener("load", startPolling);
  window.addEventListener("beforeunload", stopPolling);


  /* ---------------------------------------------------------
     9. LEGACY API WRAPPERS
     --------------------------------------------------------- */
  window.connectEverything = () => bridge.connectEverything();
  window.disconnectEverything = () => bridge.disconnectEverything();
  window.sendChat = (text) => bridge.sendChat(text);
  window.joinChannel = (id) => bridge.joinChannel(id);
  window.getChannels = () => bridge.getChannels();
  window.getUsers = () => bridge.getUsers();
  window.getCurrentChannel = () => bridge.getCurrentChannel();

});
</script>
</body>
</html>
