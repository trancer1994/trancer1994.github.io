<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting Worlds AAC + TeamTalk Shell</title>

<style>
  :root {
    --bg: #f5f5f5;
    --panel-bg: #ffffff;
    --border: #cccccc;
    --accent: #003366;
    --accent-soft: #e8eef7;
    --button-bg: #0055aa;
    --button-bg-alt: #666666;
    --button-text: #ffffff;
    --danger: #b00020;
    --success: #008744;
    --quick-bg: #eeeeee;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: #222;
    line-height: 1.5;
  }

  #app {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr) 260px;
    gap: 0.75rem;
    padding: 0.75rem;
    height: 100vh;
  }

  #left-panel,
  #middle-panel,
  #right-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* Left panel */
  #left-panel button,
  #left-panel .aac-button {
    margin-bottom: 0.4rem;
  }

  .aac-button,
  button {
    font-size: 0.95rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }

  .aac-button {
    background: var(--button-bg);
    color: var(--button-text);
  }

  .aac-button.disconnected {
    background: var(--button-bg-alt);
  }

  #disconnect-btn {
    background: var(--danger);
  }

  #status-panel {
    margin: 0.5rem 0;
    padding: 0.5rem;
    border-radius: 6px;
    background: var(--accent-soft);
    font-size: 0.9rem;
  }

  #status-panel div {
    margin-bottom: 0.25rem;
  }

  #sound-toggle,
  #presence-toggle {
    background: #dddddd;
    color: #000;
  }

  #sound-toggle:focus,
  #presence-toggle:focus,
  .aac-button:focus,
  button:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Quick phrases */
  #quick-phrases {
    margin-top: 0.5rem;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.4rem;
  }

  .quick-phrase {
    background: var(--quick-bg);
    border-radius: 4px;
    padding: 0.4rem;
    text-align: center;
    font-size: 0.9rem;
    cursor: pointer;
  }

  .quick-phrase:focus,
  .quick-phrase:hover {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* Middle panel */
  #chat {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem;
    overflow-y: auto;
    font-size: 0.95rem;
    background: #fafafa;
  }

  #input-area {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.4rem;
  }

  #chat-input {
    flex: 1;
    padding: 0.5rem;
    font-size: 0.95rem;
    border-radius: 4px;
    border: 1px solid #aaaaaa;
  }

  #send-btn {
    background: var(--accent);
    color: #ffffff;
  }

  #conversation-memory {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    max-height: 120px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    padding-top: 0.4rem;
  }

  /* Right panel */
  #current-channel {
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  #right-panel section {
    margin-bottom: 0.75rem;
  }

  #right-panel h2 {
    margin: 0 0 0.25rem 0;
    font-size: 1rem;
  }

  #channel-list,
  #user-list {
    list-style: none;
    padding-left: 0;
    margin: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    max-height: 40vh;
    overflow-y: auto;
    font-size: 0.9rem;
  }

  #channel-list li,
  #user-list li {
    padding: 0.3rem 0.4rem;
    cursor: pointer;
  }

  #channel-list li:hover,
  #channel-list li:focus {
    background: var(--accent-soft);
  }

  /* Status colours */
  .status-connected {
    color: var(--success);
    font-weight: 600;
  }

  .status-disconnected {
    color: var(--danger);
    font-weight: 600;
  }

  /* Small screens */
  @media (max-width: 900px) {
    #app {
      grid-template-columns: 1fr;
      grid-auto-rows: minmax(0, auto);
      height: auto;
    }
  }
</style>
</head>
<body>

<div id="app">

  <!-- LEFT PANEL -->
  <div id="left-panel" aria-label="AAC controls and connection" role="region">

    <button id="connect-btn"
            class="aac-button disconnected"
            onclick="connectEverything()"
            aria-label="Connect to bridge and TeamTalk">
      Connect
    </button>

    <button id="disconnect-btn"
            class="aac-button"
            onclick="disconnectEverything()"
            style="display:none;"
            aria-label="Disconnect from bridge and TeamTalk">
      Disconnect
    </button>

    <div id="status-panel" role="status" aria-live="polite">
      <div id="bridge-status">Bridge: 🔴 Disconnected</div>
      <div id="tt-status">TeamTalk: 🔴 Disconnected</div>
    </div>

    <button id="sound-toggle"
            onclick="toggleSoundCues()"
            aria-pressed="true">
      Sound cues: ON
    </button>

    <button id="presence-toggle"
            onclick="togglePresenceCues()"
            aria-pressed="true">
      Presence tones: ON
    </button>

    <button class="aac-button"
            onclick="speakText(document.getElementById('chat-input').value)"
            aria-label="Speak the text in the message box">
      Speak Text
    </button>

    <button class="aac-button"
            onclick="speechSynthesis.cancel()"
            aria-label="Stop speech">
      Stop Speech
    </button>

    <button class="aac-button"
            onclick="startSpeechToText()"
            aria-label="Convert speech to text into the message box">
      Speech → Text
    </button>

    <!-- QUICK PHRASES -->
    <div id="quick-phrases" aria-label="Quick phrases" role="list">
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('Yes')"
           onkeydown="if(event.key==='Enter' || event.key===' '){ sendQuickPhrase('Yes'); }">
        Yes
      </div>
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('No')"
           onkeydown="if(event.key==='Enter' || event.key===' '){ sendQuickPhrase('No'); }">
        No
      </div>
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('Wait a moment')"
           onkeydown="if(event.key==='Enter' || event.key===' '){ sendQuickPhrase('Wait a moment'); }">
        Wait a moment
      </div>
      <div class="quick-phrase" role="button" tabindex="0"
           onclick="sendQuickPhrase('I need help')"
           onkeydown="if(event.key==='Enter' || event.key===' '){ sendQuickPhrase('I need help'); }">
        I need help
      </div>
    </div>

  </div>

  <!-- MIDDLE PANEL -->
  <div id="middle-panel" aria-label="Chat and message composition" role="region">
    <div id="chat"
         role="log"
         aria-live="polite"
         aria-relevant="additions text">
      <p>[Connecting Worlds AAC + TeamTalk Shell]</p>
      <p>Tap “Connect” to connect to the bridge and TeamTalk.</p>
    </div>

    <div id="input-area">
      <input id="chat-input"
             type="text"
             placeholder="Type your message…"
             aria-label="Chat message"
             onkeydown="if(event.key==='Enter'){ sendTeamTalkChat(); }">
      <button id="send-btn"
              onclick="sendTeamTalkChat()"
              aria-label="Send message to current channel">
        Send
      </button>
    </div>

    <div id="conversation-memory"
         aria-label="Conversation memory"
         role="region">
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel" aria-label="Channels and users" role="region">

    <div id="current-channel">
      Current channel: <span id="current-channel-label">/</span>
    </div>

    <section aria-labelledby="channels-heading">
      <h2 id="channels-heading">Channels</h2>
      <ul id="channel-list">
        <li>[No channels yet]</li>
      </ul>
    </section>

    <section aria-labelledby="users-heading">
      <h2 id="users-heading">Users</h2>
      <ul id="user-list">
        <li>[No users yet]</li>
      </ul>
    </section>

  </div>
</div>

<!-- SOUND CUES -->
<audio id="sound-bridge-connected"></audio>
<audio id="sound-bridge-disconnected"></audio>
<audio id="sound-tt-connected"></audio>
<audio id="sound-tt-disconnected"></audio>
<audio id="sound-presence-join"></audio>
<audio id="sound-presence-leave"></audio>

<script src="bridge.js"></script>

<script>
/* ---------------------------------------------------------
   1. CENTRAL REFRESH FUNCTION
   --------------------------------------------------------- */

async function refreshUI() {
  try {
    const channels = await bridge.getChannels();
    const users = await bridge.getUsers();
    const current = await bridge.getCurrentChannel();

    updateChannelList(channels);
    updateUserList(users);
    updateCurrentChannel(current);

  } catch (err) {
    console.error("Refresh failed:", err);
  }
}

/* ---------------------------------------------------------
   2. DOM UPDATE HELPERS
   --------------------------------------------------------- */

function updateChannelList(channels) {
  const ul = document.getElementById("channel-list");
  ul.innerHTML = "";

  if (!channels || channels.length === 0) {
    ul.innerHTML = "<li>[No channels yet]</li>";
    return;
  }

  channels.forEach(ch => {
    const li = document.createElement("li");
    li.textContent = ch.name;
    li.tabIndex = 0;
    li.onclick = () => bridge.joinChannel(ch.id);
    li.onkeydown = (event) => {
      if (event.key === "Enter" || event.key === " ") {
        bridge.joinChannel(ch.id);
      }
    };
    ul.appendChild(li);
  });
}

function updateUserList(users) {
  const ul = document.getElementById("user-list");
  ul.innerHTML = "";

  if (!users || users.length === 0) {
    ul.innerHTML = "<li>[No users yet]</li>";
    return;
  }

  users.forEach(u => {
    const li = document.createElement("li");
    li.textContent = u.nickname;
    ul.appendChild(li);
  });
}

function updateCurrentChannel(ch) {
  const label = document.getElementById("current-channel-label");
  label.textContent = ch ? ch.name : "/";
}

/* ---------------------------------------------------------
   3. POLLING LOOP (fixes stale UI + ghost sessions)
   --------------------------------------------------------- */

let refreshInterval = null;

function startPolling() {
  refreshUI(); // initial sync
  refreshInterval = setInterval(refreshUI, 4000);
}

function stopPolling() {
  if (refreshInterval) clearInterval(refreshInterval);
}

/* ---------------------------------------------------------
   4. PAGE VISIBILITY + BFCache RESTORE FIXES
   --------------------------------------------------------- */

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    refreshUI();
  }
});

window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    refreshUI();
  }
});

/* ---------------------------------------------------------
   5. BRIDGE EVENT HOOKS (instant updates)
   --------------------------------------------------------- */

bridge.on("connected", refreshUI);
bridge.on("channel-added", refreshUI);
bridge.on("channel-removed", refreshUI);
bridge.on("user-connected", refreshUI);
bridge.on("user-disconnected", refreshUI);
bridge.on("channel-changed", refreshUI);

/* ---------------------------------------------------------
   6. START EVERYTHING
   --------------------------------------------------------- */

window.addEventListener("load", startPolling);
window.addEventListener("beforeunload", stopPolling);
</script>

</body>
</html>
