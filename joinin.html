<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting Worlds</title>

<!-- ==========================================================
     INLINE CSS — ACCESSIBILITY‑MODERNISED, SAME LAYOUT
     ========================================================== -->
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    color: #222;
    line-height: 1.5;
  }

  header, main, footer {
    padding: 1rem;
  }

  header {
    background: #003366;
    color: white;
  }

  h1 {
    margin: 0 0 0.5rem 0;
    font-size: 1.6rem;
  }

  /* Status panel */
  #status-panel {
    background: #e8eef7;
    padding: 0.75rem;
    border-radius: 6px;
    margin-bottom: 1rem;
  }

  #status-panel p {
    margin: 0.25rem 0;
  }

  /* Buttons */
  button {
    font-size: 1rem;
    padding: 0.6rem 1rem;
    margin: 0.25rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }

  #connect-btn.connecting { background: #ffaa00; color: #000; }
  #connect-btn.connected { background: #00aa44; color: #fff; }
  #connect-btn.disconnected { background: #666; color: #fff; }

  #disconnect-btn {
    background: #cc0000;
    color: white;
    display: none;
  }

  /* Layout grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    gap: 1rem;
  }

  section {
    background: white;
    padding: 0.75rem;
    border-radius: 6px;
    min-height: 200px;
  }

  section h2 {
    margin-top: 0;
    font-size: 1.2rem;
  }

  ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  /* Chat log */
  #chat-log {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 0.5rem;
    background: #fafafa;
  }

  .chat-line {
    margin-bottom: 0.4rem;
  }

  /* Chat input */
  #chat-input {
    width: 100%;
    padding: 0.6rem;
    font-size: 1rem;
    margin-top: 0.5rem;
    border-radius: 6px;
    border: 1px solid #aaa;
  }

  /* Footer toggles */
  footer {
    background: #ddd;
    margin-top: 1rem;
    padding: 1rem;
    border-top: 1px solid #ccc;
  }

  /* Soft focus mode */
  .soft-focus {
    filter: blur(3px);
    transition: filter 0.2s ease;
  }

  /* Status flash */
  .status-changed {
    animation: flash 0.25s ease;
  }

  @keyframes flash {
    from { background: #fff3cd; }
    to { background: #e8eef7; }
  }
</style>
</head>

<body>

<header>
  <h1>Connecting Worlds</h1>

  <div id="status-panel" role="status" aria-live="polite">
    <p id="bridge-status">Bridge: 🔴 Disconnected</p>
    <p id="tt-status">TeamTalk: 🔴 Disconnected</p>
    <p>Current channel: <span id="current-channel">/</span></p>
  </div>

  <button id="connect-btn"
          class="disconnected"
          onclick="connectEverything()"
          aria-label="Connect to bridge and TeamTalk">
    Connect
  </button>

  <button id="disconnect-btn"
          onclick="disconnectEverything()"
          aria-label="Disconnect from bridge and TeamTalk">
    Disconnect
  </button>
</header>

<main>
  <div class="grid">

    <!-- Channels -->
    <section aria-labelledby="channels-heading">
      <h2 id="channels-heading">Channels</h2>
      <ul id="channel-list"></ul>
    </section>

    <!-- Users -->
    <section aria-labelledby="users-heading">
      <h2 id="users-heading">Users</h2>
      <ul id="user-list"></ul>
    </section>

    <!-- Chat -->
    <section aria-labelledby="chat-heading">
      <h2 id="chat-heading">Chat</h2>

      <div id="chat-log"
           role="log"
           aria-live="polite"
           aria-relevant="additions text">
      </div>

      <input id="chat-input"
             type="text"
             placeholder="Type a message…"
             aria-label="Chat message"
             onkeydown="if(event.key==='Enter'){ sendTeamTalkChat(); }">
    </section>

  </div>
</main>

<footer>
  <button id="sound-toggle"
          onclick="toggleSoundCues()"
          aria-label="Toggle sound cues">
    Sound cues: ON
  </button>

  <button id="presence-toggle"
          onclick="togglePresenceCues()"
          aria-label="Toggle presence tones">
    Presence tones: ON
  </button>
</footer>

<!-- Audio cues -->
<audio id="sound-bridge-connected" src="bridge-connected.mp3"></audio>
<audio id="sound-bridge-disconnected" src="bridge-disconnected.mp3"></audio>
<audio id="sound-tt-connected" src="tt-connected.mp3"></audio>
<audio id="sound-tt-disconnected" src="tt-disconnected.mp3"></audio>

<!-- Unified bridge logic -->
<script src="bridge.js"></script>

</body>
</html>
